# Sealed Secrets Controller — Bitnami
# Install via Helm or apply this manifest to bootstrap the controller.
# The controller decrypts SealedSecret resources into native Secrets in-cluster.
#
# Install command (preferred):
#   helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#   helm install sealed-secrets sealed-secrets/sealed-secrets \
#     --namespace kube-system \
#     --set fullnameOverride=sealed-secrets-controller
#
# After install, seal secrets with:
#   kubeseal --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     --format yaml < secrets.yaml > sealed-secrets.yaml

apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: tendril-secrets
  namespace: tendril
spec:
  encryptedData: {}
  template:
    metadata:
      name: tendril-secrets
      namespace: tendril
    type: Opaque
