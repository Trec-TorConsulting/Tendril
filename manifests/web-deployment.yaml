apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-web
  namespace: tendril
  labels:
    app: tendril-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tendril-web
  template:
    metadata:
      labels:
        app: tendril-web
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - node05
      containers:
      - name: web
        image: your-registry:5000/tendril-web:latest  # Replace with your registry
        ports:
        - containerPort: 3000
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.tendril.example.com/v1"  # Replace with your domain
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: next-cache
          mountPath: /app/.next/cache
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: tmp
        emptyDir: {}
      - name: next-cache
        emptyDir: {}
