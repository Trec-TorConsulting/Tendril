apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-scheduler
  namespace: tendril
  labels:
    app: tendril-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tendril-scheduler
  template:
    metadata:
      labels:
        app: tendril-scheduler
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - node05
      containers:
      - name: scheduler
        image: 192.168.4.10:30500/tendril-api:latest  # Replace with your registry
        command: ["python", "-m", "app.scheduler.main"]
        ports:
        - containerPort: 8080
          name: health
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        envFrom:
        - secretRef:
            name: tendril-secrets
        env:
        - name: LOG_LEVEL
          value: "INFO"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
      volumes:
      - name: tmp
        emptyDir: {}
