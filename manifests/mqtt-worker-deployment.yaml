apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-mqtt-worker
  namespace: tendril
  labels:
    app: tendril-mqtt-worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: tendril-mqtt-worker
  template:
    metadata:
      labels:
        app: tendril-mqtt-worker
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: tendril-mqtt-worker
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - node05
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: tendril-mqtt-worker
              topologyKey: kubernetes.io/hostname
      containers:
      - name: mqtt-worker
        image: 192.168.4.10:30500/tendril-api:latest  # Replace with your registry
        command: ["python", "-m", "app.mqtt.worker"]
        ports:
        - containerPort: 8081
          name: webhook
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        envFrom:
        - secretRef:
            name: tendril-secrets
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: MQTT_BROKER_PORT
          value: "1883"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
      volumes:
      - name: tmp
        emptyDir: {}
