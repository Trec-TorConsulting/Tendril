apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-mqtt-worker
  namespace: tendril
  labels:
    app: tendril-mqtt-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tendril-mqtt-worker
  template:
    metadata:
      labels:
        app: tendril-mqtt-worker
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - node05
      containers:
      - name: mqtt-worker
        image: your-registry:5000/tendril-api:latest  # Replace with your registry
        command: ["python", "-m", "app.mqtt.worker"]
        ports:
        - containerPort: 8081
          name: webhook
        envFrom:
        - secretRef:
            name: tendril-secrets
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: MQTT_BROKER_PORT
          value: "1883"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        readinessProbe:
          httpGet:
            path: /docs
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: tmp
        emptyDir: {}
