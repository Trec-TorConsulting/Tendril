# Tendril ServiceMonitor manifests for Prometheus Operator auto-discovery
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tendril-api
  namespace: tendril
  labels:
    app: tendril-api
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: tendril-api
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tendril-scheduler
  namespace: tendril
  labels:
    app: tendril-scheduler
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: tendril-scheduler
  endpoints:
  - port: health
    path: /metrics
    interval: 60s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: tendril-mqtt-worker
  namespace: tendril
  labels:
    app: tendril-mqtt-worker
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: tendril-mqtt-worker
  endpoints:
  - port: webhook
    path: /metrics
    interval: 30s
