apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: actions-runner-diagnostics
  namespace: tendril
rules:
  - apiGroups: [""]
    resources:
      - pods
      - events
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: actions-runner-diagnostics
  namespace: tendril
subjects:
  - kind: Group
    name: system:serviceaccounts:actions-runner-system
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: actions-runner-diagnostics
  apiGroup: rbac.authorization.k8s.io