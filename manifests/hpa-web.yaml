apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tendril-web-hpa
  namespace: tendril
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tendril-web
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
