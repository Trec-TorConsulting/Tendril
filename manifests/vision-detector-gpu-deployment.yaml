apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-vision-detector-gpu
  namespace: tendril
  labels:
    app: tendril-vision-detector-gpu
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: tendril-vision-detector-gpu
  template:
    metadata:
      labels:
        app: tendril-vision-detector-gpu
    spec:
      nodeSelector:
        kubernetes.io/hostname: node05
      containers:
      - name: vision-detector-gpu
        image: 192.168.4.10:30500/tendril-vision-detector:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: VISION_MODEL_VERSION
          value: ""
        - name: VISION_MODEL_PATH
          value: ""
        - name: VISION_MODEL_STORAGE_KEY
          value: ""
        - name: VISION_MODEL_LOCAL_PATH
          value: "/tmp/vision/model.onnx"
        - name: VISION_INPUT_WIDTH
          value: "640"
        - name: VISION_INPUT_HEIGHT
          value: "640"
        - name: VISION_CONFIDENCE_THRESHOLD
          value: "0.25"
        - name: VISION_IOU_THRESHOLD
          value: "0.45"
        - name: VISION_MAX_DETECTIONS
          value: "50"
        - name: VISION_CLASS_MAP
          value: '{"0":"cannabis"}'
        - name: S3_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: tendril-secrets
              key: S3_ENDPOINT
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: tendril-secrets
              key: S3_ACCESS_KEY
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tendril-secrets
              key: S3_SECRET_KEY
        - name: S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: tendril-secrets
              key: S3_BUCKET
        - name: VISION_CORAL_ENABLED
          value: "false"
        - name: VISION_GPU_ENABLED
          value: "true"
        - name: VISION_CPU_ENABLED
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          timeoutSeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          timeoutSeconds: 3
          periodSeconds: 30
      volumes:
      - name: tmp
        emptyDir: {}
