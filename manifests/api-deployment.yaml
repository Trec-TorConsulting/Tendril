apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-api
  namespace: tendril
  labels:
    app: tendril-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tendril-api
  template:
    metadata:
      labels:
        app: tendril-api
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - node05
      containers:
      - name: api
        image: 192.168.4.10:30500/tendril-api:latest  # Replace with your registry
        ports:
        - containerPort: 8000
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        envFrom:
        - secretRef:
            name: tendril-secrets
        env:
        - name: LOG_LEVEL
          value: "INFO"
        - name: CORS_ORIGINS
          value: "https://tendril.maddscientist.com"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
      volumes:
      - name: tmp
        emptyDir: {}
