# DEPRECATED — replaced by redis-statefulset.yaml (persistent storage)
# This file is kept for reference only. Do not apply it.
# To migrate: kubectl delete deployment tendril-redis -n tendril
#             kubectl apply -f manifests/redis-statefulset.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tendril-redis
  namespace: tendril
  labels:
    app: tendril-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tendril-redis
  template:
    metadata:
      labels:
        app: tendril-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        args: ["--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
        ports:
        - containerPort: 6379
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: data
          mountPath: /data
        readinessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          exec:
            command: ["redis-cli", "ping"]
          initialDelaySeconds: 5
          periodSeconds: 30
      volumes:
      - name: data
        emptyDir: {}
