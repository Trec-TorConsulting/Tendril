# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--allow-multiple-documents']
      - id: check-json
      - id: check-added-large-files
        # 1024KB to accommodate web/src/lib/api-types.ts (generated from
        # the FastAPI OpenAPI schema, currently ~686KB).
        args: ['--maxkb=1024']
      - id: detect-private-key
      - id: check-merge-conflict

  # Python — Ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ['--fix', '--config', 'api/pyproject.toml']
        files: ^api/
      - id: ruff-format
        args: ['--config', 'api/pyproject.toml']
        files: ^api/

  # Security — scan for secrets
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.27.2
    hooks:
      - id: gitleaks

  # YAML lint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ['-d', '{extends: relaxed, rules: {line-length: {max: 200}}}']
