; Tendril Soil Basic — PlatformIO Build Configuration
; Supports: WiFi (ESP32 / ESP32-C6), Zigbee (ESP32-C6), Matter (ESP32-C6)

[platformio]
default_envs = wifi-esp32

; ─── Shared settings ───────────────────────────────────
[common]
lib_extra_dirs = ../shared/lib
lib_deps =
    bblanchon/ArduinoJson@^7.0
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -DTENDRIL_KIT_SOIL_BASIC
    -DTENDRIL_FW_VERSION=\"1.0.0\"
    -Wall
    -Wextra

; ─── WiFi on ESP32-WROOM-32E ──────────────────────────
[env:wifi-esp32]
platform = espressif32@^6.0
board = esp32dev
framework = arduino
extends = common
lib_deps =
    ${common.lib_deps}
    knolleary/PubSubClient@^2.8
build_flags =
    ${common.build_flags}
    -DTENDRIL_TRANSPORT_WIFI
    -DI2C_SDA=21
    -DI2C_SCL=22
    -DSOIL_ADC_PIN=34
    -DBATTERY_ADC_PIN=35
build_src_filter =
    +<config.h>
    +<sensors.*>
    +<main_wifi.cpp>

; ─── WiFi on ESP32-C6 ─────────────────────────────────
[env:wifi-esp32c6]
platform = espressif32@^6.0
board = esp32-c6-devkitm-1
framework = arduino
extends = common
lib_deps =
    ${common.lib_deps}
    knolleary/PubSubClient@^2.8
build_flags =
    ${common.build_flags}
    -DTENDRIL_TRANSPORT_WIFI
    -DI2C_SDA=6
    -DI2C_SCL=7
    -DSOIL_ADC_PIN=0
    -DBATTERY_ADC_PIN=1
build_src_filter =
    +<config.h>
    +<sensors.*>
    +<main_wifi.cpp>

; ─── Zigbee on ESP32-C6 ───────────────────────────────
[env:zigbee-esp32c6]
platform = espressif32@^6.0
board = esp32-c6-devkitm-1
framework = espidf
extends = common
build_flags =
    ${common.build_flags}
    -DTENDRIL_TRANSPORT_ZIGBEE
    -DI2C_SDA=6
    -DI2C_SCL=7
    -DSOIL_ADC_PIN=0
    -DBATTERY_ADC_PIN=1
build_src_filter =
    +<config.h>
    +<sensors.*>
    +<main_zigbee.cpp>

; ─── Matter on ESP32-C6 ───────────────────────────────
[env:matter-esp32c6]
platform = espressif32@^6.0
board = esp32-c6-devkitm-1
framework = espidf
extends = common
build_flags =
    ${common.build_flags}
    -DTENDRIL_TRANSPORT_MATTER
    -DI2C_SDA=6
    -DI2C_SCL=7
    -DSOIL_ADC_PIN=0
    -DBATTERY_ADC_PIN=1
build_src_filter =
    +<config.h>
    +<sensors.*>
    +<main_matter.cpp>
