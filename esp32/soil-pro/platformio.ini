; Tendril Soil Pro — PlatformIO Build Configuration

[platformio]
default_envs = wifi-esp32

[common]
lib_extra_dirs = ../shared/lib
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -DARDUINOJSON_ENABLE_COMMENTS=1
    -DTENDRIL_KIT="\"soil-pro\""
    -DTENDRIL_FW_VERSION="\"1.0.0\""

[env:wifi-esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_extra_dirs = ${common.lib_extra_dirs}
lib_deps =
    PubSubClient@^2.8
    ArduinoJson@^7.0
    adafruit/Adafruit BME680 Library@^2.0.0
    adafruit/Adafruit Unified Sensor@^1.1.0
    paulstoffregen/OneWire@^2.3
    milesburton/DallasTemperature@^3.11
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
build_flags =
    ${common.build_flags}
    -DTENDRIL_WIFI
    -DTENDRIL_BOARD="\"esp32\""
build_src_filter =
    +<sensors.cpp>
    +<main_wifi.cpp>

[env:wifi-esp32c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
lib_extra_dirs = ${common.lib_extra_dirs}
lib_deps =
    PubSubClient@^2.8
    ArduinoJson@^7.0
    adafruit/Adafruit BME680 Library@^2.0.0
    adafruit/Adafruit Unified Sensor@^1.1.0
    paulstoffregen/OneWire@^2.3
    milesburton/DallasTemperature@^3.11
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_WIFI
    -DTENDRIL_BOARD="\"esp32c6\""
    -DI2C_SDA=6
    -DI2C_SCL=7
    -DSOIL_SENSOR_PIN=0
    -DONEWIRE_PIN=3
    -DPH_ADC_PIN=2
    -DEC_ADC_PIN=4
    -DBATTERY_ADC_PIN=1
build_src_filter =
    +<sensors.cpp>
    +<main_wifi.cpp>

[env:zigbee-esp32c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = espidf
lib_extra_dirs = ${common.lib_extra_dirs}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_ZIGBEE
    -DTENDRIL_BOARD="\"esp32c6\""
build_src_filter =
    +<sensors.cpp>
    +<main_zigbee.cpp>

[env:matter-esp32c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = espidf
lib_extra_dirs = ${common.lib_extra_dirs}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_MATTER
    -DTENDRIL_BOARD="\"esp32c6\""
build_src_filter =
    +<sensors.cpp>
    +<main_matter.cpp>
