; Tendril Aero Monitor — PlatformIO Build Configuration
; Extends Hydro Monitor with pressure transducer support.

[platformio]
default_envs = wifi-esp32

[common]
lib_extra_dirs = ../shared/lib
monitor_speed = 115200
build_flags =
    -DTENDRIL_KIT="\"aero-monitor\""
    -DTENDRIL_FW_VERSION="\"1.0.0\""

[env:wifi-esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_extra_dirs = ${common.lib_extra_dirs}
lib_deps =
    PubSubClient@^2.8
    ArduinoJson@^7.0
    paulstoffregen/OneWire@^2.3
    milesburton/DallasTemperature@^3.11
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_WIFI
    -DTENDRIL_BOARD="\"esp32\""
build_src_filter = +<sensors.cpp> +<main_wifi.cpp>

[env:wifi-esp32c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = arduino
lib_extra_dirs = ${common.lib_extra_dirs}
lib_deps =
    PubSubClient@^2.8
    ArduinoJson@^7.0
    paulstoffregen/OneWire@^2.3
    milesburton/DallasTemperature@^3.11
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_WIFI
    -DTENDRIL_BOARD="\"esp32c6\""
    -DONEWIRE_PIN=3
    -DPH_ADC_PIN=2
    -DEC_ADC_PIN=4
    -DULTRA_TRIG_PIN=10
    -DULTRA_ECHO_PIN=11
    -DPRESSURE_ADC_PIN=0
    -DMOSFET_PIN=5
    -DBATTERY_ADC_PIN=1
build_src_filter = +<sensors.cpp> +<main_wifi.cpp>

[env:zigbee-esp32c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = espidf
lib_extra_dirs = ${common.lib_extra_dirs}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_ZIGBEE
    -DTENDRIL_BOARD="\"esp32c6\""
build_src_filter = +<sensors.cpp> +<main_zigbee.cpp>

[env:matter-esp32c6]
platform = espressif32
board = esp32-c6-devkitm-1
framework = espidf
lib_extra_dirs = ${common.lib_extra_dirs}
monitor_speed = ${common.monitor_speed}
build_flags =
    ${common.build_flags}
    -DTENDRIL_MATTER
    -DTENDRIL_BOARD="\"esp32c6\""
build_src_filter = +<sensors.cpp> +<main_matter.cpp>
