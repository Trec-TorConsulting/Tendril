site_name: Tendril Documentation
site_url: https://trec-torconsulting.github.io/Tendril/
repo_url: https://github.com/Trec-TorConsulting/Tendril
repo_name: Trec-TorConsulting/Tendril
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: quick-start.md
      - Self-Hosting: self-hosting.md
      - Configuration: configuration.md
  - Guides:
      - Cannabis Quality Philosophy: cannabis-quality-philosophy.md
      - AI Operations: ai-operations.md
      - ESP32 Hardware: esp32-hardware.md
      - Atlas Scientific Sensors: atlas-scientific/README.md
      - Atlas Calibration: atlas-scientific/calibration.md
      - Atlas ESPHome Template: atlas-scientific/esphome-template.md
      - Billing & Plans: billing.md
      - Disaster Recovery: disaster-recovery.md
  - Architecture:
      - System Overview: architecture.md
      - API Reference: api-reference.md
  - Development:
      - Developer Guide: development.md
      - Contributing: contributing.md
