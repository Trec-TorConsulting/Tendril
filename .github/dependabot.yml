version: 2
updates:
  # Python API dependencies
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
    labels:
      - dependencies
      - python

  # Web frontend dependencies
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-deps:
        patterns: ["*"]
    labels:
      - dependencies
      - javascript

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns: ["*"]
    labels:
      - dependencies
      - ci

  # Docker base images
  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: monthly
    groups:
      docker:
        patterns: ["*"]
    labels:
      - dependencies
      - docker

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: monthly
    groups:
      docker:
        patterns: ["*"]
    labels:
      - dependencies
      - docker
