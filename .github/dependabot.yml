version: 2
updates:
  # Python API dependencies
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    reviewers:
      - trector282

  # Web frontend dependencies
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    reviewers:
      - trector282

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    reviewers:
      - trector282

  # Docker base images
  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    reviewers:
      - trector282

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    reviewers:
      - trector282
