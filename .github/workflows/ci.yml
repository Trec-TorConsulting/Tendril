name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Basic Checks ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check --config api/pyproject.toml api/

  lint-web:
    name: Lint (web)
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --ignore-scripts --legacy-peer-deps
        working-directory: web
      - run: npm run lint
        working-directory: web

  verify-api-types:
    name: Verify API Types
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -r api/requirements.txt
      - run: npm ci --ignore-scripts --legacy-peer-deps
        working-directory: web
      - name: Regenerate types and diff against committed
        run: |
          npm run verify:types
        working-directory: web
      - name: How to fix
        if: failure()
        run: |
          echo "::error::web/src/lib/api-types.ts is out of date with the FastAPI OpenAPI schema."
          echo "::error::Run 'npm run gen:types' inside web/ and commit the updated file."

  # ── Docker Build & Push ───────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        target: [api, web]
        runner: [arc-runner-arm64, arc-runner-x86]
        include:
          - runner: arc-runner-arm64
            platform: linux/arm64
            arch: arm64
          - runner: arc-runner-x86
            platform: linux/amd64
            arch: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
      - uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:${{ matrix.arch }}
          cache-from: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=registry.registry.svc.cluster.local:5000/tendril-{0}:buildcache-{1}', matrix.target, matrix.arch) || '' }}
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=registry.registry.svc.cluster.local:5000/tendril-{0}:buildcache-{1},mode=max', matrix.target, matrix.arch) || '' }}

  # ── Create multi-arch manifest ───────────────────────────────
  manifest:
    name: Multi-arch Manifest
    runs-on: arc-runner-arm64
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    strategy:
      matrix:
        target: [api, web]
    steps:
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
      - run: |
          docker buildx imagetools create -t registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:latest \
            registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:arm64 \
            registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:amd64

  # ── Deploy (rolling restart after successful build on main) ──
  deploy:
    name: Deploy
    runs-on: arc-runner-arm64
    needs: [lint, lint-web, verify-api-types, manifest]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
      - run: |
          kubectl rollout restart deployment/tendril-api -n tendril
          kubectl rollout restart deployment/tendril-web -n tendril
          kubectl rollout restart deployment/tendril-mqtt-worker -n tendril
          kubectl rollout restart deployment/tendril-scheduler -n tendril
      - run: |
          kubectl rollout status deployment/tendril-api -n tendril --timeout=300s
          kubectl rollout status deployment/tendril-web -n tendril --timeout=300s
          kubectl rollout status deployment/tendril-mqtt-worker -n tendril --timeout=300s
          kubectl rollout status deployment/tendril-scheduler -n tendril --timeout=300s

