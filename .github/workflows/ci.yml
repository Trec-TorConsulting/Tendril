name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Basic Checks ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check --config api/pyproject.toml api/

  # NOTE: the non-blocking whole-codebase mypy baseline moved to
  # .github/workflows/nightly.yml (daily) so it no longer installs the full
  # dependency set on every PR/push. The blocking strict subset stays here.

  # Strict-mode mypy on the modules listed under
  # ``[[tool.mypy.overrides]]`` in api/pyproject.toml. This IS blocking —
  # adding a module to the strict list is a one-way ratchet that ensures
  # we don't regress.
  mypy-strict:
    name: mypy (strict subset)
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            api/requirements.txt
            api/requirements-dev.txt
      - run: pip install -r api/requirements.txt -r api/requirements-dev.txt
      # The strict modules are referenced explicitly so this job fails fast
      # if any of them stop type-checking. Keep this list in sync with the
      # [[tool.mypy.overrides]] block in api/pyproject.toml.
      - run: |
          mypy --config-file api/pyproject.toml \
            api/app/automation/suppression.py \
            api/app/automation/critical_alerts_defaults.py \
            api/app/mqtt/dedup.py \
            api/app/integrations/connectors/retry.py \
            api/app/analytics/service.py \
            api/app/admin/service.py \
            api/app/devices/service.py \
            api/app/support/service.py \
            api/app/reference/service.py \
            api/app/weather/service.py \
            api/app/tenants/service.py \
            api/app/notifications/service.py \
            api/app/sensors/service.py

  lint-web:
    name: Lint (web)
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --ignore-scripts --legacy-peer-deps
        working-directory: web
      - run: npm run lint
        working-directory: web

  verify-api-types:
    name: Verify API Types
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: api/requirements.txt
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -r api/requirements.txt
      - run: npm ci --ignore-scripts --legacy-peer-deps
        working-directory: web
      - name: Regenerate types and diff against committed
        run: |
          npm run verify:types
        working-directory: web
      - name: How to fix
        if: failure()
        run: |
          echo "::error::web/src/lib/api-types.ts is out of date with the FastAPI OpenAPI schema."
          echo "::error::Run 'npm run gen:types' inside web/ and commit the updated file."

  # ── Detect image-affecting changes (for PR build validation) ──
  # Always runs so docker-build's `needs` is satisfied on every event; the
  # output is only consulted for pull_request builds.
  changes:
    name: Detect Docker changes
    runs-on: arc-runner-arm64
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'api/Dockerfile'
              - 'api/requirements.txt'
              - 'web/Dockerfile'
              - 'web/package.json'
              - 'web/package-lock.json'

  # ── Docker Build & Push ───────────────────────────────────────
  # Push images on main. On PRs the build runs only when image inputs change
  # (Dockerfiles, requirements, package manifests) — validation without push —
  # or on demand via workflow_dispatch. Keeps the common PR off the four build
  # runners while still catching Dockerfile/dependency breakage before merge.
  # These legs are not required status checks.
  docker-build:
    name: Docker Build
    runs-on: ${{ matrix.runner }}
    needs: [changes]
    if: >-
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' ||
      needs.changes.outputs.docker == 'true'
    strategy:
      matrix:
        target: [api, web]
        runner: [arc-runner-arm64, arc-runner-x86]
        include:
          - runner: arc-runner-arm64
            platform: linux/arm64
            arch: arm64
          - runner: arc-runner-x86
            platform: linux/amd64
            arch: amd64
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
      - uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:${{ matrix.arch }}
          # Read the shared layer cache on every build (incl. PR validation);
          # only main writes it back so PR builds cannot poison the cache.
          cache-from: type=registry,ref=registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:buildcache-${{ matrix.arch }}
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=registry.registry.svc.cluster.local:5000/tendril-{0}:buildcache-{1},mode=max', matrix.target, matrix.arch) || '' }}

  # ── Create multi-arch manifest ───────────────────────────────
  manifest:
    name: Multi-arch Manifest
    runs-on: arc-runner-arm64
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    strategy:
      matrix:
        target: [api, web]
    steps:
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
      - run: |
          docker buildx imagetools create -t registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:latest \
            registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:arm64 \
            registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:amd64

  # ── Deploy (rolling restart after successful build on main) ──
  deploy:
    name: Deploy
    runs-on: arc-runner-arm64
    needs: [lint, lint-web, verify-api-types, manifest]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    # No manual approval gate — pushes to main auto-deploy. The post-deploy
    # smoke test below is the safety net: it fails the job (paging on-call)
    # if the rolled-out pods aren't actually serving traffic.
    steps:
      - uses: actions/checkout@v7
      - run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
      - run: |
          kubectl rollout restart deployment/tendril-api -n tendril
          kubectl rollout restart deployment/tendril-web -n tendril
          kubectl rollout restart deployment/tendril-mqtt-worker -n tendril
          kubectl rollout restart deployment/tendril-scheduler -n tendril
      - name: Wait for rollout (with retry + diagnostics)
        run: |
          set -euo pipefail

          check_rollout() {
            local deploy="$1"
            local namespace="tendril"
            local attempt

            for attempt in 1 2; do
              echo "Checking rollout for ${deploy} (attempt ${attempt}/2)"
              if kubectl rollout status "deployment/${deploy}" -n "${namespace}" --timeout=420s; then
                echo "Rollout healthy for ${deploy}"
                return 0
              fi

              if [ "$attempt" -lt 2 ]; then
                echo "First rollout check failed for ${deploy}; collecting diagnostics before retry."
                kubectl get deployment "${deploy}" -n "${namespace}" -o wide || true
                kubectl describe deployment "${deploy}" -n "${namespace}" || true
                kubectl get pods -n "${namespace}" -l "app=${deploy}" -o wide || true
                kubectl get events -n "${namespace}" --sort-by=.lastTimestamp | tail -n 40 || true
                sleep 20
              fi
            done

            echo "::error::Rollout failed for ${deploy} after retry"
            return 1
          }

          # Wait on all four rollouts in parallel — the deployments are
          # independent, so the previous sequential waits just multiplied
          # the worst case (up to 4 × 420s). Each check tees to its own log
          # so the grouped output below stays readable.
          pids=()
          deploys=(tendril-api tendril-web tendril-mqtt-worker tendril-scheduler)
          for d in "${deploys[@]}"; do
            check_rollout "$d" >"/tmp/rollout-${d}.log" 2>&1 &
            pids+=("$!")
          done

          rc=0
          for i in "${!pids[@]}"; do
            if ! wait "${pids[$i]}"; then
              rc=1
            fi
            echo "===== ${deploys[$i]} ====="
            cat "/tmp/rollout-${deploys[$i]}.log"
          done

          exit "$rc"

      # ── Post-deploy smoke test ──────────────────────────────
      # Verifies the rolled-out pods are actually serving HTTP traffic via
      # the production ingress, not just "Ready" per kubelet. Failing here
      # marks the deploy job red so on-call gets a clear signal that the
      # rollout completed but the service is broken (DB unreachable, env
      # var typo, ingress misroute, etc.). Each check retries to absorb
      # warmup latency without flapping.
      - name: Post-deploy smoke test
        env:
          API_BASE: https://api.tendrilgrow.com
          WEB_BASE: https://tendrilgrow.com
        run: |
          set -euo pipefail

          # Generic retry: $1=description, $2=URL, $3=expected status,
          # $4=optional grep pattern that response body must contain.
          check() {
            local desc="$1" url="$2" want_status="$3" want_body="${4:-}"
            local attempt
            for attempt in 1 2 3 4 5 6; do
              echo "→ [$attempt/6] $desc — $url"
              local response status body
              response=$(curl --silent --show-error --max-time 15 \
                --write-out '\nHTTP_STATUS:%{http_code}' "$url" || true)
              status="${response##*HTTP_STATUS:}"
              body="${response%HTTP_STATUS:*}"
              if [ "$status" = "$want_status" ]; then
                if [ -z "$want_body" ] || echo "$body" | grep -q "$want_body"; then
                  echo "  ✓ $desc"
                  return 0
                fi
                echo "  ✗ status OK but body missing '$want_body':"
                echo "$body" | head -5
              else
                echo "  ✗ got status $status (want $want_status)"
                echo "$body" | head -5
              fi
              sleep 10
            done
            echo "::error::Smoke check failed: $desc"
            return 1
          }

          # API liveness — must respond OK even with DB down.
          check "API /health" "$API_BASE/health" 200 '"status":"ok"'

          # API readiness — must report DB connected.
          check "API /health/ready" "$API_BASE/health/ready" 200 '"db":"connected"'

          # API system status endpoint — full dependency surface.
          check "API /v1/status" "$API_BASE/v1/status" 200 '"database":"connected"'

          # Web shell — root must render. Marketing page is unauthenticated
          # and a 200 with HTML means Next.js is serving and the upstream
          # API URL resolves.
          check "Web /" "$WEB_BASE/" 200 'Tendril'

          echo "All post-deploy smoke checks passed."

  # ── API & Web Test Jobs ──────────────────────────────────────
  api-test:
    name: API Tests
    # Run on x86 ARC runners (12-core Ubuntu w/ NVMe) instead of the Pi 5
    # ARM runners. pytest is I/O-bound on Postgres TRUNCATE round-trips, and
    # the ARM runners' storage (USB/SD) becomes the bottleneck — measured
    # 62 min on arm64 vs an expected ~15-25 min on x86.
    runs-on: arc-runner-x86
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tendril
          POSTGRES_PASSWORD: tendril
          POSTGRES_DB: tendril_test
        ports:
          - 5432:5432
        # --tmpfs mounts the data directory on RAM — eliminates the disk
        # I/O bottleneck that dominates the test runtime. The DB is
        # discarded at job end anyway; durability is irrelevant.
        # --shm-size bumps shared memory so Postgres can use larger buffers
        # without falling back to disk for hash joins.
        options: >-
          --tmpfs /var/lib/postgresql/data:rw,size=2g
          --shm-size=512m
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest --tb=short -q --durations=20 -n 4
        env:
          DATABASE_URL: postgresql+asyncpg://tendril:tendril@localhost:5432/tendril_test
          JWT_SECRET: ci-test-secret-not-real
          INTEGRATION_ENCRYPTION_KEY: m8eWk-kF4nPTdc7Y0wccVuqqEYTUvrAWdVcF5zKBuo0=

  web-test:
    name: Web Type-Check & Unit Tests
    runs-on: arc-runner-arm64
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run type-check
      - run: npm run test:run

