name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Basic Checks ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check --config api/pyproject.toml api/

  # Whole-codebase mypy check. Non-blocking on purpose — see the comment
  # at the top of api/pyproject.toml's [tool.mypy] section. The strict
  # subset is enforced by the separate ``mypy-strict`` job below.
  mypy:
    name: mypy (baseline, non-blocking)
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -r api/requirements.txt -r api/requirements-dev.txt
      # ``|| true`` keeps this job green so branch protection does not
      # block PRs on the baseline errors. The CI output still surfaces
      # every error for developers to chip away at; the strict subset
      # below is the actual enforcement gate.
      - run: mypy --config-file api/pyproject.toml || true

  # Strict-mode mypy on the modules listed under
  # ``[[tool.mypy.overrides]]`` in api/pyproject.toml. This IS blocking —
  # adding a module to the strict list is a one-way ratchet that ensures
  # we don't regress.
  mypy-strict:
    name: mypy (strict subset)
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install -r api/requirements.txt -r api/requirements-dev.txt
      # The strict modules are referenced explicitly so this job fails fast
      # if any of them stop type-checking. Keep this list in sync with the
      # [[tool.mypy.overrides]] block in api/pyproject.toml.
      - run: |
          mypy --config-file api/pyproject.toml \
            api/app/automation/suppression.py \
            api/app/automation/critical_alerts_defaults.py

  lint-web:
    name: Lint (web)
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --ignore-scripts --legacy-peer-deps
        working-directory: web
      - run: npm run lint
        working-directory: web

  verify-api-types:
    name: Verify API Types
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: pip install -r api/requirements.txt
      - run: npm ci --ignore-scripts --legacy-peer-deps
        working-directory: web
      - name: Regenerate types and diff against committed
        run: |
          npm run verify:types
        working-directory: web
      - name: How to fix
        if: failure()
        run: |
          echo "::error::web/src/lib/api-types.ts is out of date with the FastAPI OpenAPI schema."
          echo "::error::Run 'npm run gen:types' inside web/ and commit the updated file."

  # ── Docker Build & Push ───────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        target: [api, web]
        runner: [arc-runner-arm64, arc-runner-x86]
        include:
          - runner: arc-runner-arm64
            platform: linux/arm64
            arch: arm64
          - runner: arc-runner-x86
            platform: linux/amd64
            arch: amd64
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
      - uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:${{ matrix.arch }}
          cache-from: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=registry.registry.svc.cluster.local:5000/tendril-{0}:buildcache-{1}', matrix.target, matrix.arch) || '' }}
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=registry.registry.svc.cluster.local:5000/tendril-{0}:buildcache-{1},mode=max', matrix.target, matrix.arch) || '' }}

  # ── Create multi-arch manifest ───────────────────────────────
  manifest:
    name: Multi-arch Manifest
    runs-on: arc-runner-arm64
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    strategy:
      matrix:
        target: [api, web]
    steps:
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true
      - run: |
          docker buildx imagetools create -t registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:latest \
            registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:arm64 \
            registry.registry.svc.cluster.local:5000/tendril-${{ matrix.target }}:amd64

  # ── Deploy (rolling restart after successful build on main) ──
  deploy:
    name: Deploy
    runs-on: arc-runner-arm64
    needs: [lint, lint-web, verify-api-types, manifest]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/arm64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
      - run: |
          kubectl rollout restart deployment/tendril-api -n tendril
          kubectl rollout restart deployment/tendril-web -n tendril
          kubectl rollout restart deployment/tendril-mqtt-worker -n tendril
          kubectl rollout restart deployment/tendril-scheduler -n tendril
      - run: |
          kubectl rollout status deployment/tendril-api -n tendril --timeout=300s
          kubectl rollout status deployment/tendril-web -n tendril --timeout=300s
          kubectl rollout status deployment/tendril-mqtt-worker -n tendril --timeout=300s
          kubectl rollout status deployment/tendril-scheduler -n tendril --timeout=300s

      # ── Post-deploy smoke test ──────────────────────────────
      # Verifies the rolled-out pods are actually serving HTTP traffic via
      # the production ingress, not just "Ready" per kubelet. Failing here
      # marks the deploy job red so on-call gets a clear signal that the
      # rollout completed but the service is broken (DB unreachable, env
      # var typo, ingress misroute, etc.). Each check retries to absorb
      # warmup latency without flapping.
      - name: Post-deploy smoke test
        env:
          API_BASE: https://api.tendrilgrow.com
          WEB_BASE: https://tendrilgrow.com
        run: |
          set -euo pipefail

          # Generic retry: $1=description, $2=URL, $3=expected status,
          # $4=optional grep pattern that response body must contain.
          check() {
            local desc="$1" url="$2" want_status="$3" want_body="${4:-}"
            local attempt
            for attempt in 1 2 3 4 5 6; do
              echo "→ [$attempt/6] $desc — $url"
              local response status body
              response=$(curl --silent --show-error --max-time 15 \
                --write-out '\nHTTP_STATUS:%{http_code}' "$url" || true)
              status="${response##*HTTP_STATUS:}"
              body="${response%HTTP_STATUS:*}"
              if [ "$status" = "$want_status" ]; then
                if [ -z "$want_body" ] || echo "$body" | grep -q "$want_body"; then
                  echo "  ✓ $desc"
                  return 0
                fi
                echo "  ✗ status OK but body missing '$want_body':"
                echo "$body" | head -5
              else
                echo "  ✗ got status $status (want $want_status)"
                echo "$body" | head -5
              fi
              sleep 10
            done
            echo "::error::Smoke check failed: $desc"
            return 1
          }

          # API liveness — must respond OK even with DB down.
          check "API /health" "$API_BASE/health" 200 '"status":"ok"'

          # API readiness — must report DB connected.
          check "API /health/ready" "$API_BASE/health/ready" 200 '"db":"connected"'

          # API system status endpoint — full dependency surface.
          check "API /v1/status" "$API_BASE/v1/status" 200 '"database":"connected"'

          # Web shell — root must render. Marketing page is unauthenticated
          # and a 200 with HTML means Next.js is serving and the upstream
          # API URL resolves.
          check "Web /" "$WEB_BASE/" 200 'Tendril'

          echo "All post-deploy smoke checks passed."

