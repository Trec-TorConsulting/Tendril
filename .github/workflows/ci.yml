name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Basic Checks ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: arc-runner-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check --config api/pyproject.toml api/

  # ── Docker Build & Push ───────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        target: [api, web]
        runner: [arc-runner-arm64, arc-runner-x86]
        include:
          - runner: arc-runner-arm64
            platform: linux/arm64
          - runner: arc-runner-x86
            platform: linux/amd64
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."192.168.4.10:30500"]
              http = true
      - uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: 192.168.4.10:30500/tendril-${{ matrix.target }}:latest
          cache-from: type=registry,ref=192.168.4.10:30500/tendril-${{ matrix.target }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref=192.168.4.10:30500/tendril-{0}:buildcache,mode=max', matrix.target) || '' }}

  # ── Deploy (rolling restart after successful build on main) ──
  deploy:
    name: Deploy
    runs-on: arc-runner-arm64
    needs: [lint, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - run: |
          kubectl rollout restart deployment/tendril-api -n tendril
          kubectl rollout restart deployment/tendril-web -n tendril
          kubectl rollout restart deployment/tendril-mqtt-worker -n tendril
          kubectl rollout restart deployment/tendril-scheduler -n tendril
      - run: |
          kubectl rollout status deployment/tendril-api -n tendril --timeout=120s
          kubectl rollout status deployment/tendril-web -n tendril --timeout=120s
          kubectl rollout status deployment/tendril-mqtt-worker -n tendril --timeout=120s
          kubectl rollout status deployment/tendril-scheduler -n tendril --timeout=120s

