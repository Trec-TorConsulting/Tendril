name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'  # Weekly Monday 7am UTC

permissions:
  contents: read
  security-events: write

jobs:
  # ── Bandit: Python Security Linter ────────────────────────────
  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit[sarif]
      - run: |
          bandit -r api/app/ \
            -f sarif \
            -o bandit-results.sarif \
            --severity-level medium \
            --confidence-level medium \
            -x api/app/migrations \
            || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  # ── Trivy: Container Image Scanning ──────────────────────────
  trivy-api:
    name: Trivy (API Image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          tags: tendril-api:scan
          load: true
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tendril-api:scan
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

  trivy-web:
    name: Trivy (Web Image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          tags: tendril-web:scan
          load: true
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: tendril-web:scan
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

  # ── Kubesec: Kubernetes Manifest Security ────────────────────
  kubesec:
    name: Kubesec (K8s Manifests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -sSL https://github.com/controlplaneio/kubesec/releases/download/v2.14.2/kubesec_linux_amd64.tar.gz | tar xz
          chmod +x kubesec
          sudo mv kubesec /usr/local/bin/
      - run: |
          echo "## Kubesec Results" > kubesec-report.md
          EXIT=0
          for f in manifests/*-deployment.yaml; do
            echo "### $(basename $f)" >> kubesec-report.md
            RESULT=$(kubesec scan "$f" 2>&1)
            SCORE=$(echo "$RESULT" | jq -r '.[0].score // 0')
            echo "Score: $SCORE" >> kubesec-report.md
            if [ "$SCORE" -lt 0 ]; then
              echo "❌ CRITICAL issues found in $f (score: $SCORE)"
              echo "$RESULT" | jq -r '.[0].scoring.critical[]?.reason // empty' >> kubesec-report.md
              EXIT=1
            fi
            echo "$RESULT" | jq -r '.[0].scoring.advise[]?.reason // empty' | head -5 >> kubesec-report.md
            echo "" >> kubesec-report.md
          done
          cat kubesec-report.md
          exit $EXIT
