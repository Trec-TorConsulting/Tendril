name: Mirror Base Images

on:
  schedule:
    - cron: "0 4 * * 0" # Every Sunday at 4:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  mirror:
    name: Mirror to Local Registry
    runs-on: arc-runner-arm64
    strategy:
      matrix:
        include:
          - source: python:3.14-slim-bookworm
            target: 192.168.4.10:30500/mirror/python:3.14-slim-bookworm
          - source: node:26-slim
            target: 192.168.4.10:30500/mirror/node:26-slim
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config-inline: |
            [registry."192.168.4.10:30500"]
              http = true

      - name: Mirror ${{ matrix.source }} to local registry
        run: |
          docker buildx imagetools create \
            --tag ${{ matrix.target }} \
            docker.io/${{ matrix.source }}
