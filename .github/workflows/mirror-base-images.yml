name: Mirror Base Images

on:
  schedule:
    - cron: "0 4 * * 0" # Every Sunday at 4:00 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  mirror:
    name: Mirror to Local Registry
    runs-on: arc-runner-arm64
    strategy:
      matrix:
        include:
          - source: python:3.14-slim-bookworm
            target: registry.registry.svc.cluster.local:5000/mirror/python:3.14-slim-bookworm
          - source: node:26-slim
            target: registry.registry.svc.cluster.local:5000/mirror/node:26-slim
    steps:
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host
          buildkitd-config-inline: |
            [registry."registry.registry.svc.cluster.local:5000"]
              http = true

      - name: Mirror ${{ matrix.source }} to local registry
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3"
            docker buildx imagetools create \
              --tag ${{ matrix.target }} \
              docker.io/${{ matrix.source }} && break
            if [ $attempt -eq 3 ]; then
              echo "::error::Failed after 3 attempts"
              exit 1
            fi
            echo "Retrying in 30s..."
            sleep 30
          done
