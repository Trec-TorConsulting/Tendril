[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "S",    # bandit (security)
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]
ignore = [
    "S101",   # assert used (fine in tests)
    "S104",   # binding to 0.0.0.0 (required for containers)
    "B008",   # function call in default argument (FastAPI Depends)
    "RUF012", # mutable class variables (SQLAlchemy models)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S106", "E501", "UP038"]  # Allow asserts, hardcoded passwords, long lines, tuple isinstance in tests
"**/grow_types.py" = ["E501"]  # Data file with long string literals
"**/grow_type_configs/**" = ["E501", "RUF001"]  # Data files with long string literals and unicode chars
"**/task_generator.py" = ["E501"]  # Task templates with long description strings
"**/ai/context.py" = ["E501", "RUF001", "N806"]  # AI prompts with long strings and special chars
"**/ai/reports.py" = ["E501"]  # PDF generation with long binary strings
"**/ai/tools.py" = ["E501"]  # AI tool definitions with long description strings
"**/automation/engine.py" = ["E501"]  # Alert templates with long message strings
"**/automation/models.py" = ["E501"]  # Model definitions with long defaults
"**/notifications/models.py" = ["E501"]  # Notification model definitions
"**/integrations/connectors/**" = ["E501"]  # API connector URL strings
"**/migrations/**/*.py" = ["E501"]  # Migrations contain long SQL strings
"**/email_service.py" = ["E501"]  # Email HTML templates with long inline styles
"**/outdoor/**_routes.py" = ["E501"]  # Route handlers with long descriptions
"**/nutrition/seed_*.py" = ["E501", "RUF005"]  # Seed data files with long description strings
"**/data/reports.py" = ["E501", "RUF001"]  # HTML report templates with long inline styles and en-dashes
"**/mqtt/auth_webhook.py" = ["E402", "S104"]  # Prometheus import after app setup, binds to 0.0.0.0
"**/config_management/seed.py" = ["E501", "T201"]  # SQL strings and seed script print
"**/data/seed_treatments.py" = ["T201"]  # Seed script print
"**/sensors/routes.py" = ["E501"]  # Sensor route definitions
"**/sensors/tent_routes.py" = ["E501"]  # Tent sensor routes
"**/grows/feeding_routes.py" = ["E501"]  # Feeding route definitions

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.ruff.format]
quote-style = "double"

# ─── mypy ────────────────────────────────────────────────────────────────────
# Two-tier configuration:
#   * Global defaults are deliberately permissive so adopting mypy on the
#     existing codebase is incremental and non-blocking.
#   * Per-module overrides (``[[tool.mypy.overrides]]`` below) opt specific
#     packages into strict checking; expand the strict list one module at a
#     time as code is cleaned up. CI runs ``mypy api/app`` and reports errors
#     but does not fail the build (see ``.github/workflows/ci.yml`` job
#     ``mypy``) \u2014 the strict-mode overrides ARE allowed to fail the
#     ``mypy-strict`` job, which serves as the locked-in regression gate.

[tool.mypy]
python_version = "3.14"
files = ["api/app"]
plugins = ["sqlalchemy.ext.mypy.plugin"]

# Permissive defaults \u2014 see header comment.
ignore_missing_imports = true
follow_imports = "silent"
check_untyped_defs = false
disallow_untyped_defs = false
disallow_incomplete_defs = false
warn_unused_ignores = false
warn_return_any = false
warn_redundant_casts = true
no_implicit_optional = true
strict_equality = true

# Some packages (mostly migrations and ad-hoc seed scripts) aren't worth
# typing. Exclude them rather than ignoring their errors one by one.
exclude = [
    '^api/migrations/',
    '^api/app/.+/seed_.*\.py$',
    '^api/app/config_management/seed\.py$',
]

# Modules that have been audited and locked into strict mode. The
# ``mypy-strict`` CI job runs these in isolation and fails the build on
# any new error. Add new modules here one at a time.
[[tool.mypy.overrides]]
module = [
    "app.automation.suppression",
    "app.automation.critical_alerts_defaults",
    "app.mqtt.dedup",
    "app.integrations.connectors.retry",
    "app.analytics.service",
    "app.admin.service",
    "app.devices.service",
]
disallow_untyped_defs = true
disallow_incomplete_defs = true
warn_unused_ignores = true
warn_return_any = true
strict_equality = true
