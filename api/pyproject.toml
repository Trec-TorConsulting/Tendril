[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.ruff]
target-version = "py314"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "S",    # bandit (security)
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
]
ignore = [
    "S101",   # assert used (fine in tests)
    "S104",   # binding to 0.0.0.0 (required for containers)
    "B008",   # function call in default argument (FastAPI Depends)
    "RUF012", # mutable class variables (SQLAlchemy models)
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["S101", "S106", "E501", "UP038"]  # Allow asserts, hardcoded passwords, long lines, tuple isinstance in tests
"**/grow_types.py" = ["E501"]  # Data file with long string literals
"**/grow_type_configs/**" = ["E501", "RUF001"]  # Data files with long string literals and unicode chars
"**/task_generator.py" = ["E501"]  # Task templates with long description strings
"**/ai/context.py" = ["E501", "RUF001", "N806"]  # AI prompts with long strings and special chars
"**/ai/reports.py" = ["E501"]  # PDF generation with long binary strings
"**/ai/tools.py" = ["E501"]  # AI tool definitions with long description strings
"**/automation/engine.py" = ["E501"]  # Alert templates with long message strings
"**/automation/models.py" = ["E501"]  # Model definitions with long defaults
"**/notifications/models.py" = ["E501"]  # Notification model definitions
"**/integrations/connectors/**" = ["E501"]  # API connector URL strings
"**/migrations/**/*.py" = ["E501"]  # Migrations contain long SQL strings
"**/email_service.py" = ["E501"]  # Email HTML templates with long inline styles
"**/outdoor/**_routes.py" = ["E501"]  # Route handlers with long descriptions
"**/nutrition/seed_*.py" = ["E501", "RUF005"]  # Seed data files with long description strings
"**/data/reports.py" = ["E501", "RUF001"]  # HTML report templates with long inline styles and en-dashes
"**/mqtt/auth_webhook.py" = ["E402", "S104"]  # Prometheus import after app setup, binds to 0.0.0.0
"**/config_management/seed.py" = ["E501", "T201"]  # SQL strings and seed script print
"**/data/seed_treatments.py" = ["T201"]  # Seed script print
"**/sensors/routes.py" = ["E501"]  # Sensor route definitions
"**/sensors/tent_routes.py" = ["E501"]  # Tent sensor routes
"**/grows/feeding_routes.py" = ["E501"]  # Feeding route definitions

[tool.ruff.lint.isort]
known-first-party = ["app", "tests"]

[tool.ruff.format]
quote-style = "double"
